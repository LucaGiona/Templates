<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontaktformular</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/form.css">
</head>
<body>

  <main class="form-wrapper">

    <div class="form-header">
      <p class="form-label">Kontakt</p>
      <h1 class="form-title">Schreib uns.</h1>
    </div>

    <form class="contact-form" id="contact-form" novalidate>

      <div class="form-row form-row--two">

        <div class="form-group">
          <label for="name">Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Dein Name"
            autocomplete="name"
          >
          <span class="form-error" id="name-error">Bitte gib deinen Namen ein.</span>
        </div>

        <div class="form-group">
          <label for="email">E-Mail</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="deine@mail.com"
            autocomplete="email"
          >
          <span class="form-error" id="email-error">Bitte gib eine gültige E-Mail-Adresse ein.</span>
        </div>

      </div>

      <div class="form-group">
        <label for="anfrage">Anfrage</label>
        <input
          type="text"
          id="anfrage"
          name="anfrage"
          placeholder="Kurz zusammengefasst"
        >
        <span class="form-error" id="anfrage-error">Bitte beschreibe deine Anfrage.</span>
      </div>

      <div class="form-group">
        <label for="nachricht">Nachricht</label>
        <textarea
          id="nachricht"
          name="nachricht"
          rows="6"
          placeholder="Erzähl uns mehr…"
        ></textarea>
        <span class="form-error" id="nachricht-error">Bitte schreib eine Nachricht.</span>
      </div>

      <div class="form-footer">
        <button type="submit" class="form-submit" id="submit-btn">
          <span class="submit-text">Anfrage abschicken</span>
          <span class="submit-arrow">→</span>
        </button>
      </div>

    </form>

    <div class="form-success" id="form-success" hidden>
      <p class="success-icon">✓</p>
      <p class="success-title">Nachricht gesendet.</p>
      <p class="success-sub">Wir melden uns bald bei dir.</p>
    </div>

  </main>

  <script src="js/form.js"></script>
</body>
</html>
